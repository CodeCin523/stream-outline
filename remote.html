<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stream Outline — Remote</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    /* Transparent so OBS window capture picks up only the avatar */
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #app { width: 100vw; height: 100vh; background: transparent; }
    #app > canvas { display: block; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/remote.js"></script>
</body>
</html>
